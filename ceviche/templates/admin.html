{% extends "base.html" %}

{% block title %}Panel de Administrador - Cevichería System{% endblock %}

{% block content %}
<div class="card">
    <h2>🍤 Panel de Administrador</h2>
    <p>Gestión completa del sistema de cevichería.</p>
    <div id="adminInfo"></div>
</div>

<!-- Pestañas de navegación -->
<div class="card">
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button class="btn" onclick="showTab('products')" id="productsTab">📦 Productos</button>
        <button class="btn" onclick="showTab('users')" id="usersTab">👥 Usuarios</button>
        <button class="btn" onclick="showTab('categories')" id="categoriesTab">🏷️ Categorías</button>
    </div>
    
    <!-- Tab de Productos -->
    <div id="productsTabContent" class="tab-content">
        <h3>Gestión de Productos</h3>
        <button onclick="showAddProductForm()" class="btn btn-success">➕ Agregar Producto</button>
        <button onclick="loadProducts()" class="btn">🔄 Recargar Productos</button>
        
        <!-- Formulario para agregar producto -->
        <div id="addProductForm" class="hidden" style="margin-top: 20px; background-color: #f8f9fa; padding: 20px; border-radius: 4px;">
            <h4>Agregar Nuevo Producto</h4>
            <form onsubmit="addProduct(event)">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label for="productName">Nombre:</label>
                        <input type="text" id="productName" required>
                    </div>
                    <div class="form-group">
                        <label for="productPrice">Precio:</label>
                        <input type="number" id="productPrice" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="productStock">Stock:</label>
                        <input type="number" id="productStock" min="0" value="0">
                    </div>
                    <div class="form-group">
                        <label for="productBrand">Marca:</label>
                        <input type="text" id="productBrand">
                    </div>
                    <div class="form-group">
                        <label for="productSku">SKU:</label>
                        <input type="text" id="productSku">
                    </div>
                    <div class="form-group">
                        <label for="productUnit">Unidad:</label>
                        <select id="productUnit">
                            <option value="unidad">Unidad</option>
                            <option value="metro">Metro</option>
                            <option value="galón">Galón</option>
                            <option value="bolsa">Bolsa</option>
                            <option value="par">Par</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="productCategory">Categoría:</label>
                    <select id="productCategory" required>
                        <option value="">Seleccionar categoría...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="productDescription">Descripción:</label>
                    <textarea id="productDescription" rows="3"></textarea>
                </div>
                <div>
                    <button type="submit" class="btn btn-success">Guardar Producto</button>
                    <button type="button" onclick="hideAddProductForm()" class="btn">Cancelar</button>
                </div>
            </form>
        </div>
        
        <div id="productsContainer" style="margin-top: 20px;"></div>
    </div>
    
    <!-- Tab de Usuarios -->
    <div id="usersTabContent" class="tab-content hidden">
        <h3>Gestión de Usuarios</h3>
        <button onclick="loadUsers()" class="btn">🔄 Cargar Usuarios</button>
        <div id="usersContainer" style="margin-top: 20px;"></div>
    </div>
    
    <!-- Tab de Categorías -->
    <div id="categoriesTabContent" class="tab-content hidden">
        <h3>Categorías del Sistema</h3>
        <button onclick="loadCategories()" class="btn">🔄 Cargar Categorías</button>
        <div id="categoriesContainer" style="margin-top: 20px;"></div>
    </div>
</div>

<script>
let categories = [];

document.addEventListener('DOMContentLoaded', function() {
    // Verificar autenticación y rol de administrador
    if (!authToken) {
        window.location.href = '/login';
        return;
    }
    
    // Verificar que el usuario sea administrador
    checkAuth().then(() => {
        if (!currentUser || currentUser.role !== 'admin') {
            showAlert('Acceso denegado. Se requieren permisos de administrador.', 'danger');
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 2000);
            return;
        }
        
        loadAdminInfo();
        showTab('products');
        loadCategories();
    });
});

function loadAdminInfo() {
    document.getElementById('adminInfo').innerHTML = `
        <div style="background-color: #d4edda; padding: 15px; border-radius: 4px; margin-top: 15px;">
            <h4>👤 Administrador: ${currentUser.username}</h4>
            <p><strong>Acceso:</strong> Gestión completa del sistema</p>
            <p><strong>Permisos:</strong> CRUD de productos, visualización de usuarios, gestión de categorías</p>
        </div>
    `;
}

function showTab(tabName) {
    // Ocultar todos los tabs
    document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.add('hidden');
    });
    
    // Mostrar el tab seleccionado
    document.getElementById(tabName + 'TabContent').classList.remove('hidden');
    
    // Actualizar botones
    document.querySelectorAll('#productsTab, #usersTab, #categoriesTab').forEach(btn => {
        btn.style.backgroundColor = '#3498db';
    });
    document.getElementById(tabName + 'Tab').style.backgroundColor = '#2980b9';
    
    // Cargar datos según el tab
    if (tabName === 'products') {
        loadProducts();
    } else if (tabName === 'users') {
        loadUsers();
    } else if (tabName === 'categories') {
        loadCategories();
    }
}

async function loadProducts() {
    try {
        const response = await authenticatedFetch('/api/products');
        
        if (response.ok) {
            const products = await response.json();
            displayAdminProducts(products);
        } else {
            showAlert('Error cargando productos', 'danger');
        }
    } catch (error) {
        console.error('Error:', error);
        showAlert('Error de conexión', 'danger');
    }
}

function displayAdminProducts(products) {
    const container = document.getElementById('productsContainer');
    
    if (products.length === 0) {
        container.innerHTML = '<p>No hay productos registrados.</p>';
        return;
    }
    
    let html = `
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Categoría</th>
                    <th>Marca</th>
                    <th>SKU</th>
                </tr>
            </thead>
            <tbody>
    `;
    
    products.forEach(product => {
        html += `
            <tr>
                <td>${product.id}</td>
                <td>${product.name}</td>
                <td>$${product.price}</td>
                <td>${product.stock}</td>
                <td>${product.category || 'N/A'}</td>
                <td>${product.brand || 'N/A'}</td>
                <td>${product.sku || 'N/A'}</td>
            </tr>
        `;
    });
    
    html += '</tbody></table>';
    container.innerHTML = html;
}

async function loadUsers() {
    try {
        const response = await authenticatedFetch('/api/users');
        
        if (response.ok) {
            const users = await response.json();
            displayUsers(users);
        } else {
            showAlert('Error cargando usuarios', 'danger');
        }
    } catch (error) {
        console.error('Error:', error);
        showAlert('Error de conexión', 'danger');
    }
}

function displayUsers(users) {
    const container = document.getElementById('usersContainer');
    
    if (users.length === 0) {
        container.innerHTML = '<p>No hay usuarios registrados.</p>';
        return;
    }
    
    let html = `
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Usuario</th>
                    <th>Rol</th>
                    <th>Fecha de Registro</th>
                </tr>
            </thead>
            <tbody>
    `;
    
    users.forEach(user => {
        const roleColor = user.role === 'admin' ? 'color: #C8102E; font-weight: bold;' : '';
        html += `
            <tr>
                <td>${user.id}</td>
                <td>${user.username}</td>
                <td style="${roleColor}">${user.role}</td>
                <td>${new Date(user.created_at).toLocaleDateString()}</td>
            </tr>
        `;
    });
    
    html += '</tbody></table>';
    container.innerHTML = html;
}

async function loadCategories() {
    try {
        const response = await authenticatedFetch('/api/categories');
        
        if (response.ok) {
            categories = await response.json();
            displayCategories(categories);
            updateCategorySelect();
        } else {
            showAlert('Error cargando categorías', 'danger');
        }
    } catch (error) {
        console.error('Error:', error);
        showAlert('Error de conexión', 'danger');
    }
}

function displayCategories(categories) {
    const container = document.getElementById('categoriesContainer');
    
    if (categories.length === 0) {
        container.innerHTML = '<p>No hay categorías registradas.</p>';
        return;
    }
    
    let html = '<div class="grid">';
    
    categories.forEach(category => {
        html += `
            <div class="card">
                <h4>${category.name}</h4>
                <p>${category.description || 'Sin descripción'}</p>
            </div>
        `;
    });
    
    html += '</div>';
    container.innerHTML = html;
}

function updateCategorySelect() {
    const select = document.getElementById('productCategory');
    select.innerHTML = '<option value="">Seleccionar categoría...</option>';
    
    categories.forEach(category => {
        select.innerHTML += `<option value="${category.id}">${category.name}</option>`;
    });
}

function showAddProductForm() {
    document.getElementById('addProductForm').classList.remove('hidden');
}

function hideAddProductForm() {
    document.getElementById('addProductForm').classList.add('hidden');
    document.querySelector('#addProductForm form').reset();
}

async function addProduct(event) {
    event.preventDefault();
    
    const productData = {
        name: document.getElementById('productName').value,
        price: parseFloat(document.getElementById('productPrice').value),
        stock: parseInt(document.getElementById('productStock').value) || 0,
        category_id: parseInt(document.getElementById('productCategory').value),
        brand: document.getElementById('productBrand').value || null,
        sku: document.getElementById('productSku').value || null,
        unit: document.getElementById('productUnit').value,
        description: document.getElementById('productDescription').value || null
    };
    
    try {
        const response = await authenticatedFetch('/api/products', {
            method: 'POST',
            body: JSON.stringify(productData)
        });
        
        if (response.ok) {
            showAlert('Producto creado exitosamente', 'success');
            hideAddProductForm();
            loadProducts();
        } else {
            const data = await response.json();
            showAlert(data.message || 'Error creando producto', 'danger');
        }
    } catch (error) {
        console.error('Error:', error);
        showAlert('Error de conexión', 'danger');
    }
}
</script>
{% endblock %}
