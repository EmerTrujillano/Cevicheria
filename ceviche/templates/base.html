<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cevichería System{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #006A96; /* Azul océano */
            --secondary-color: #C8102E; /* Rojo peruano */
            --accent-color: #F4B942; /* Dorado peruano */
            --ocean-blue: #4ECDC4; /* Azul turquesa */
            --deep-blue: #1B4C73; /* Azul profundo */
            --coral: #FF6B6B; /* Coral */
            --seafoam: #95E1D3; /* Verde mar */
            --sand: #F8E6A0; /* Color arena */
            --success-green: #28A745; /* Verde éxito */
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background: linear-gradient(135deg, #F0F8FF 0%, #E3F2FD 100%);
            color: var(--deep-blue);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .navbar {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--deep-blue) 100%);
            color: white;
            padding: 1rem 0;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,106,150,0.2);
        }
        
        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        
        .navbar h1 {
            font-size: 1.8rem;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        
        .nav-links {
            display: flex;
            gap: 20px;
        }
        
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 25px;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .nav-links a:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0,106,150,0.1);
            border: 1px solid rgba(149,225,211,0.2);
            transition: transform 0.3s;
        }
        
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,106,150,0.15);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--deep-blue);
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E0F2F1;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
            background: #FAFAFA;
        }
        
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--ocean-blue);
            background: white;
            box-shadow: 0 0 0 3px rgba(76,205,196,0.1);
        }
        
        .btn {
            background: linear-gradient(135deg, var(--primary-color), var(--deep-blue));
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,106,150,0.2);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,106,150,0.3);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--secondary-color), var(--coral));
        }
        
        .btn-danger:hover {
            background: linear-gradient(135deg, #A00E26, var(--secondary-color));
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--seafoam), var(--success-green));
            color: var(--deep-blue);
        }
        
        .btn-success:hover {
            background: linear-gradient(135deg, #7DDCC4, var(--seafoam));
        }
        
        .btn-warning {
            background: linear-gradient(135deg, var(--accent-color), var(--sand));
            color: var(--deep-blue);
        }
        
        .btn-warning:hover {
            background: linear-gradient(135deg, #E5A53A, var(--accent-color));
        }
        
        .alert {
            padding: 18px 20px;
            margin-bottom: 25px;
            border-radius: 10px;
            border: none;
            font-weight: 500;
        }
        
        .alert-success {
            background: linear-gradient(135deg, var(--seafoam), #E8F8F5);
            color: var(--deep-blue);
            border-left: 5px solid var(--seafoam);
        }
        
        .alert-danger {
            background: linear-gradient(135deg, #FFE6E6, #FFF0F0);
            color: var(--secondary-color);
            border-left: 5px solid var(--secondary-color);
        }
        
        .alert-warning {
            background: linear-gradient(135deg, var(--sand), #FFF9E6);
            color: var(--deep-blue);
            border-left: 5px solid var(--accent-color);
        }
        
        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,106,150,0.1);
        }
        
        .table th, .table td {
            padding: 15px 18px;
            text-align: left;
            border-bottom: 1px solid #E0F2F1;
        }
        
        .table th {
            background: linear-gradient(135deg, var(--primary-color), var(--ocean-blue));
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }
        
        .table tbody tr:hover {
            background: linear-gradient(135deg, #F0F8FF, #E3F2FD);
        }
        
        .hidden {
            display: none;
        }
        
        .text-center {
            text-align: center;
        }
        
        .mb-3 {
            margin-bottom: 1rem;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1>🍤 Sistema Cevichería</h1>
            <div class="nav-links" id="navLinks">
                <a href="/dashboard" id="dashboardLink" class="hidden">Dashboard</a>
                <a href="/admin" id="adminLink" class="hidden">Admin Panel</a>
                <a href="#" id="logoutLink" class="hidden" onclick="logout()">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="alerts"></div>
        {% block content %}{% endblock %}
    </div>

    <script>
        // Variables globales
        let currentUser = null;
        let authToken = localStorage.getItem('authToken');

        // Verificar autenticación al cargar la página
        document.addEventListener('DOMContentLoaded', function() {
            if (authToken) {
                checkAuth();
            }
            updateNavbar();
        });

        // Verificar autenticación
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/profile', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                if (response.ok) {
                    currentUser = await response.json();
                    updateNavbar();
                } else {
                    logout();
                }
            } catch (error) {
                console.error('Error verificando autenticación:', error);
                logout();
            }
        }

        // Actualizar barra de navegación
        function updateNavbar() {
            const dashboardLink = document.getElementById('dashboardLink');
            const adminLink = document.getElementById('adminLink');
            const logoutLink = document.getElementById('logoutLink');

            if (currentUser) {
                dashboardLink.classList.remove('hidden');
                logoutLink.classList.remove('hidden');
                
                if (currentUser.role === 'admin') {
                    adminLink.classList.remove('hidden');
                } else {
                    adminLink.classList.add('hidden');
                }
            } else {
                dashboardLink.classList.add('hidden');
                adminLink.classList.add('hidden');
                logoutLink.classList.add('hidden');
            }
        }

        // Cerrar sesión
        async function logout() {
            if (authToken) {
                try {
                    await fetch('/api/auth/logout', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${authToken}`
                        }
                    });
                } catch (error) {
                    console.error('Error cerrando sesión:', error);
                }
            }
            
            localStorage.removeItem('authToken');
            authToken = null;
            currentUser = null;
            updateNavbar();
            window.location.href = '/';
        }

        // Mostrar alertas
        function showAlert(message, type = 'success') {
            const alertsContainer = document.getElementById('alerts');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            
            alertsContainer.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        // Realizar petición autenticada
        async function authenticatedFetch(url, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            
            if (authToken) {
                headers.Authorization = `Bearer ${authToken}`;
            }
            
            return fetch(url, {
                ...options,
                headers
            });
        }
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
