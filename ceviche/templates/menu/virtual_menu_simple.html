<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital - Cevichería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #006A96;
            --secondary-color: #C8102E;
            --accent-color: #F4B942;
            --ocean-blue: #4ECDC4;
            --seafoam: #95E1D3;
        }
        
        body {
            background: linear-gradient(135deg, #F0F8FF 0%, #E3F2FD 100%);
            font-family: 'Segoe UI', sans-serif;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--ocean-blue));
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,106,150,0.2);
        }
        
        .table-info {
            background: var(--accent-color);
            color: var(--primary-color);
            padding: 10px;
            border-radius: 10px;
            margin: 20px;
            text-align: center;
            font-weight: bold;
        }
        
        .category-section {
            margin: 30px 20px;
        }
        
        .category-title {
            background: linear-gradient(135deg, var(--secondary-color), #FF6B6B);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 600;
        }
        
        .product-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,106,150,0.1);
            border-left: 5px solid var(--ocean-blue);
        }
        
        .product-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 8px;
        }
        
        .product-description {
            color: #666;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        
        .product-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--secondary-color);
            float: right;
        }
        
        .product-tags {
            margin-top: 10px;
        }
        
        .tag {
            display: inline-block;
            background: var(--seafoam);
            color: var(--primary-color);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            margin: 2px;
            font-weight: 500;
        }
        
        .tag.picante { background: #FFE5E5; color: #D63384; }
        .tag.recomendado { background: #FFF3CD; color: #B08800; }
        .tag.nuevo { background: #D1ECF1; color: #0C5460; }
        .tag.mas_vendido { background: #D4EDDA; color: #155724; }
        
        .ingredients {
            font-style: italic;
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .rating {
            color: #FFC107;
            margin-top: 8px;
        }
        
        .info-message {
            background: linear-gradient(135deg, var(--ocean-blue), var(--seafoam));
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 20px;
            text-align: center;
            font-weight: 500;
            border-radius: 50px;
            padding: 15px 25px;
            box-shadow: 0 4px 20px rgba(200,16,46,0.3);
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🍤 Cevichería Digital</h1>
        <p>Disfruta nuestros deliciosos platos marinos</p>
    </div>
    
    {% if table_id %}
    <div class="table-info">
        <i class="fas fa-table"></i> Mesa {{ table_id }}
    </div>
    {% endif %}
    
    <div class="info-message">
        <i class="fas fa-info-circle"></i> 
        Navega por nuestro menú y cuando estés listo, llama a tu mozo para realizar el pedido
    </div>
    
    <div id="menu-container">
        <!-- El menú se cargará dinámicamente aquí -->
    </div>
    
    <script>
        // Cargar menú desde la base de datos
        async function loadMenu() {
            try {
                const response = await fetch('/menu/products');
                const data = await response.json();
                
                if (data.success) {
                    renderMenu(data.data);
                } else {
                    document.getElementById('menu-container').innerHTML = 
                        '<div class="alert alert-danger">Error al cargar el menú</div>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('menu-container').innerHTML = 
                    '<div class="alert alert-danger">Error al cargar el menú</div>';
            }
        }
        
        function renderMenu(categories) {
            const container = document.getElementById('menu-container');
            let html = '';
            
            categories.forEach(category => {
                if (category.products && category.products.length > 0) {
                    html += `
                        <div class="category-section">
                            <div class="category-title">
                                ${getCategoryIcon(category.category.name)} ${category.category.name}
                            </div>
                    `;
                    
                    category.products.forEach(product => {
                        html += renderProduct(product);
                    });
                    
                    html += '</div>';
                }
            });
            
            container.innerHTML = html;
        }
        
        function renderProduct(product) {
            const tags = product.tags || [];
            const tagsHtml = tags.map(tag => 
                `<span class="tag ${tag}">${getTagLabel(tag)}</span>`
            ).join('');
            
            const rating = product.average_rating || 0;
            const ratingHtml = rating > 0 ? `
                <div class="rating">
                    ${'★'.repeat(Math.floor(rating))}${'☆'.repeat(5 - Math.floor(rating))} 
                    (${rating.toFixed(1)}) • ${product.reviews_count || 0} reseñas
                </div>
            ` : '';
            
            const imageHtml = product.image_url ? 
                `<img src="${product.image_url}" alt="${product.name}" style="width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 10px;">` : '';
            
            return `
                <div class="product-card">
                    ${imageHtml}
                    <div class="product-name">${product.name}</div>
                    <div class="product-description">${product.description || ''}</div>
                    ${product.ingredients ? `<div class="ingredients">Ingredientes: ${product.ingredients}</div>` : ''}
                    <div class="product-price">S/ ${product.price.toFixed(2)}</div>
                    <div class="product-tags">${tagsHtml}</div>
                    ${ratingHtml}
                </div>
            `;
        }
        
        function getCategoryIcon(categoryName) {
            const icons = {
                'Ceviches': '🐟',
                'Tiraditos': '🔪',
                'Arroces': '🍚',
                'Bebidas': '🥤',
                'Entradas': '🍤',
                'Platos Calientes': '🔥',
                'Postres': '🍰'
            };
            return icons[categoryName] || '🍽️';
        }
        
        function getTagLabel(tag) {
            const labels = {
                'picante': '🌶️ Picante',
                'recomendado': '⭐ Recomendado',
                'nuevo': '🆕 Nuevo',
                'mas_vendido': '🏆 Más Vendido'
            };
            return labels[tag] || tag;
        }
        
        // Inicializar cuando se carga la página
        window.onload = function() {
            loadMenu();
            
            {% if table_id %}
            // Marcar mesa como temporalmente ocupada
            markTableAsTemporarilyOccupied({{ table_id }});
            
            setTimeout(() => {
                alert('¡Bienvenido a nuestra Cevichería! Mesa {{ table_id }}\n\nNavega por nuestro menú y cuando estés listo, llama a tu mozo para realizar el pedido.');
            }, 1000);
            {% endif %}
        }
        
        async function markTableAsTemporarilyOccupied(tableId) {
            try {
                await fetch('/api/tables/occupy-temporarily', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ table_id: tableId })
                });
            } catch (error) {
                console.error('Error marking table as occupied:', error);
            }
        }
    </script>
</body>
</html>
