{% extends "base.html" %}
{% block title %}Sesión Expirada - Cevichería{% endblock %}
{% block content %}
<div class="container py-4 text-center">
    <div class="alert alert-warning">
        <i class="fas fa-clock fa-3x mb-3"></i>
        <h4>Sesión Expirada</h4>
        <p>Tu tiempo de mesa ha expirado. Por favor, vuelve a seleccionar una mesa si deseas continuar.</p>
        <div class="mt-3">
            <a href="{{ url_for('restaurant_qr.select_table') }}" class="btn btn-primary">
                <i class="fas fa-table"></i> Seleccionar Nueva Mesa
            </a>
            <a href="{{ url_for('restaurant_qr.restaurant_home') }}" class="btn btn-secondary">
                <i class="fas fa-home"></i> Volver al Inicio
            </a>
        </div>
    </div>
</div>
{% endblock %}
